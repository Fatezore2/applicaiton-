mutation CreateSubject($name: String!, $description: String, $userId: UUID!) @auth(level: USER) {
  subject_insert(data: {name: $name, description: $description, userId: $userId})
}

query GetTasksForSubject($subjectId: UUID!) @auth(level: USER) {
  tasks(where: {subjectId: {eq: $subjectId}}) {
    id
    name
    description
    isCompleted
  }
}

mutation UpdateTaskCompletion($id: UUID!, $isCompleted: Boolean!) @auth(level: USER) {
  task_update(key: {id: $id}, data: {isCompleted: $isCompleted})
}

query GetGoalsForUser($userId: UUID!) @auth(level: USER) {
  goals(where: {userId: {eq: $userId}}) {
    id
    description
    targetValue
    targetUnit
    targetDate
  }
}