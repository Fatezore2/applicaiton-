type User @table {
  displayName: String!
  createdAt: Timestamp!
  email: String
  photoUrl: String
}

type Subject @table {
  user: User!
  name: String!
  createdAt: Timestamp!
  description: String
}

type Task @table {
  subject: Subject!
  name: String!
  createdAt: Timestamp!
  description: String
  isCompleted: Boolean
}

type StudySession @table {
  user: User!
  task: Task!
  startTime: Timestamp!
  endTime: Timestamp!
  durationMinutes: Int!
  createdAt: Timestamp!
  notes: String
}

type Goal @table {
  user: User!
  subject: Subject!
  targetValue: Int!
  targetUnit: String!
  targetDate: Date!
  createdAt: Timestamp!
  description: String
}